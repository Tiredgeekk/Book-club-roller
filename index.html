<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Literature Club Book Picker</title>

<style>
:root {
    --burgundy: #6D1F2F;
    --cream: #F8F4EC;
    --card: #FFFDF8;
    --border: #D8CFC3;
    --text: #2B2B2B;
}

body {
    font-family: "Times New Roman", serif;
    background: var(--cream);
    color: var(--text);
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

header {
    text-align: center;
}

h1 {
    color: var(--burgundy);
    margin-bottom: 5px;
}

.quote {
    font-style: italic;
    color: #555;
}

.book-of-month {
    background: linear-gradient(to bottom, #fffdf8, #f3ecdf);
    border: 2px solid var(--burgundy);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin: 25px 0;
}

.book-of-month h2 {
    color: var(--burgundy);
    margin-top: 0;
}

.section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 25px;
}

.section h2 {
    color: var(--burgundy);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
}

input {
    width: 70%;
    padding: 10px;
    font-family: inherit;
    font-size: 1rem;
}

button {
    background: var(--burgundy);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    margin: 4px;
}

button:hover {
    opacity: 0.9;
}

.book-card {
    background: white;
    border-left: 5px solid var(--burgundy);
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
}

.small-btn {
    padding: 6px 10px;
    font-size: 0.9rem;
}

.stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 15px 0;
    font-weight: bold;
}

.empty {
    color: #666;
    font-style: italic;
}
</style>
</head>

<body>

<header>
    <h1>Literature Club Book Picker</h1>

    <p class="quote">
        "A room without books is like a body without a soul."
    </p>

    <div class="stats">
        <div>📚 Available Books: <span id="bookCount">0</span></div>
        <div>🏆 Previous Winners: <span id="winnerCount">0</span></div>
    </div>
</header>

<div class="book-of-month" id="bookOfMonth">
    <h2>📖 Book of the Month 📖</h2>
    <p>No winner selected yet.</p>
</div>

<div class="section">
    <h2>Add a Book</h2>

    <input
        id="bookInput"
        type="text"
        placeholder="Enter a book title..."
    >

    <button onclick="addBook()">Add Book</button>
</div>

<div class="section">
    <h2>Vote Candidates</h2>

    <button onclick="rollBooks()">
        Roll 3 Books
    </button>

    <div id="rolledBooks" class="empty">
        No books rolled yet.
    </div>
</div>

<div class="section">
    <h2>Current Book Pool</h2>

    <div id="bookPool"></div>
</div>

<div class="section">
    <h2>Previous Winners Archive</h2>

    <div id="winnerList"></div>
</div>

<script>

let books =
    JSON.parse(localStorage.getItem("books")) || [];

let winners =
    JSON.parse(localStorage.getItem("winners")) || [];

let bookOfMonth =
    JSON.parse(localStorage.getItem("bookOfMonth")) || null;

function saveData() {
    localStorage.setItem("books", JSON.stringify(books));
    localStorage.setItem("winners", JSON.stringify(winners));
    localStorage.setItem("bookOfMonth", JSON.stringify(bookOfMonth));
}

function updateCounts() {
    document.getElementById("bookCount").textContent =
        books.length;

    document.getElementById("winnerCount").textContent =
        winners.length;
}

function renderBookOfMonth() {
    const banner =
        document.getElementById("bookOfMonth");

    if (!bookOfMonth) {
        banner.innerHTML = `
            <h2>📖 Book of the Month 📖</h2>
            <p>No winner selected yet.</p>
        `;
        return;
    }

    banner.innerHTML = `
        <h2>📖 Book of the Month 📖</h2>
        <h3>${bookOfMonth.title}</h3>
        <p>Selected ${bookOfMonth.date}</p>
    `;
}

function renderBooks() {

    const pool =
        document.getElementById("bookPool");

    if (books.length === 0) {

        pool.innerHTML =
            '<p class="empty">No books available.</p>';

        return;
    }

    pool.innerHTML = books.map((book, index) => `
        <div class="book-card">
            <strong>${book}</strong><br>

            <button
                class="small-btn"
                onclick="removeBook(${index})">
                Remove
            </button>
        </div>
    `).join("");

    updateCounts();
}

function renderWinners() {

    const list =
        document.getElementById("winnerList");

    if (winners.length === 0) {

        list.innerHTML =
            '<p class="empty">No winners yet.</p>';

        return;
    }

    list.innerHTML = winners
        .slice()
        .reverse()
        .map(entry => `
            <div class="book-card">
                🏆 <strong>${entry.title}</strong><br>
                <em>${entry.date}</em>
            </div>
        `).join("");
}

function addBook() {

    const input =
        document.getElementById("bookInput");

    const title =
        input.value.trim();

    if (!title) return;

    books.push(title);

    saveData();
    renderBooks();

    input.value = "";
}

function removeBook(index) {

    books.splice(index, 1);

    saveData();
    renderBooks();
    updateCounts();
}

function rollBooks() {

    const container =
        document.getElementById("rolledBooks");

    if (books.length < 3) {

        container.innerHTML =
            '<p class="empty">Need at least 3 books.</p>';

        return;
    }

    const shuffled =
        [...books].sort(() => Math.random() - 0.5);

    const selected =
        shuffled.slice(0, 3);

    container.innerHTML = selected.map(book => `
        <div class="book-card">
            <strong>${book}</strong><br>

            <button
                class="small-btn"
                onclick="markWinner('${book.replace(/'/g, "\\'")}')">
                Mark as Winner
            </button>
        </div>
    `).join("");
}

function markWinner(book) {

    books =
        books.filter(b => b !== book);

    const now =
        new Date();

    const date =
        now.toLocaleString('default', {
            month: 'long',
            year: 'numeric'
        });

    const winnerEntry = {
        title: book,
        date: date
    };

    winners.push(winnerEntry);

    bookOfMonth = winnerEntry;

    saveData();

    renderBooks();
    renderWinners();
    renderBookOfMonth();
    updateCounts();

    document.getElementById("rolledBooks").innerHTML =
        '<p class="empty">Winner selected! See you next month.</p>';
}

renderBooks();
renderWinners();
renderBookOfMonth();
updateCounts();

</script>

</body>
</html>
